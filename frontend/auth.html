<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Procurement Planner | Authentication</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="cursor-glow"></div>
    <div id="toast-container"></div>
    <div class="ambient-glow-bg"></div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p class="subtitle" id="auth-subtitle">Secure access to your workspace</p>
            </div>

            <div class="role-toggle" id="role-toggle" data-role="manager">
                <div class="role-slider"></div>
                <button class="role-btn active" data-role="manager">Manager</button>
                <button class="role-btn" data-role="vendor">Vendor</button>
            </div>

            <form class="auth-form" id="auth-form">
                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn" id="submit-btn">Continue</button>
            </form>

            <div class="auth-footer">
                <span id="footer-text">Don't have an account?</span>
                <a href="#" class="auth-link" id="toggle-auth">Sign up</a>
            </div>
        </div>
    </div>
    <script type="module" src="auth.js"></script>
</body>
</html>
